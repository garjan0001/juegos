<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Colección de Videojuegos</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
<section class="form-section">

<h2>Añadir juego</h2>

<form id="gameForm">
    <input id="title" placeholder="Título del juego" required>

    <input id="platform" placeholder="Plataforma (PS1, PS2...)" required>

    <input id="generation" placeholder="Generación" required>

    <input id="region" placeholder="Región (PAL/NTSC)" required>

    <button type="submit">➕ Añadir</button>
</form>

</section>
    
    <h1>🎮 Mi Colección de Videojuegos</h1>

    <div class="buscador">
        <input
            type="text"
            id="search"
            placeholder="Buscar juego..."
        >

        <select id="platformFilter">
            <option value="">Todas las plataformas</option>
        </select>
    </div>

    <div id="stats"></div>
</header>

<main>
    <div id="gamesContainer" class="games-grid"></div>
</main>

<script src="js/app.js"></script>

</body>
</html>
